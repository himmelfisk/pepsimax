name: Update Pepsi Max Prices

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest prices from Kassalapp API
        env:
          KASSAL_API_KEY: ${{ secrets.KASSAL_API_KEY }}
        run: node scripts/fetch-prices.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update Pepsi Max prices [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
